<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixl Dashboard — Sign in</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f10;
      color: #e1e1e6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1e;
      border: 1px solid #2a2a2e;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      width: 100%;
      max-width: 380px;
    }
    .logo { font-size: 2rem; margin-bottom: 8px; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
    p { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .btn-slack {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #4a154b;
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-slack:hover { background: #611f64; }
    .btn-slack svg { width: 20px; height: 20px; flex-shrink: 0; }
    .error {
      margin-top: 20px;
      padding: 10px 16px;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 8px;
      color: #f87171;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎯</div>
    <h1>Pixl Dashboard</h1>
    <p>Sign in with your Slack account to access the support dashboard.</p>
    <a href="/auth/slack" class="btn-slack">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zM8.834 6.313a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zM18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zM17.688 8.834a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.165 0a2.528 2.528 0 0 1 2.523 2.522v6.312zM15.165 18.956a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zM15.165 17.688a2.527 2.527 0 0 1-2.52-2.523 2.526 2.526 0 0 1 2.52-2.52h6.313A2.527 2.527 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.523h-6.313z"/>
      </svg>
      Sign in with Slack
    </a>
    <div class="error" id="error"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    if (err) {
      const el = document.getElementById('error');
      el.style.display = 'block';
      el.textContent = err === 'cancelled' ? 'Sign-in was cancelled.' : 'Authentication failed. Please try again.';
    }
  </script>
</body>
</html>
