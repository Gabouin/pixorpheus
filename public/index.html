<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixl Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f10;
      color: #e1e1e6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a1e;
      border-bottom: 1px solid #2a2a2e;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 1.2rem; font-weight: 700; flex: 1; }
    header .user { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #aaa; }
    header .user img { width: 28px; height: 28px; border-radius: 50%; }
    header .logout {
      color: #888;
      text-decoration: none;
      font-size: 0.8rem;
      padding: 4px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s;
    }
    header .logout:hover { border-color: #666; color: #ccc; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      border-bottom: 1px solid #2a2a2e;
    }
    .tab {
      padding: 8px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      color: #888;
      border: 1px solid transparent;
      border-bottom: none;
      background: none;
      transition: color 0.2s;
    }
    .tab.active {
      color: #e1e1e6;
      background: #1a1a1e;
      border-color: #2a2a2e;
      margin-bottom: -1px;
    }

    /* ── Content ── */
    .content { padding: 24px; max-width: 900px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Leaderboard ── */
    .leaderboard { display: flex; flex-direction: column; gap: 8px; }
    .lb-row {
      background: #1a1a1e;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .lb-rank { width: 28px; font-size: 1rem; text-align: center; color: #555; font-weight: 700; }
    .lb-rank.gold   { color: #f59e0b; }
    .lb-rank.silver { color: #9ca3af; }
    .lb-rank.bronze { color: #b45309; }
    .lb-avatar { width: 36px; height: 36px; border-radius: 50%; background: #2a2a2e; }
    .lb-name { flex: 1; font-size: 0.95rem; }
    .lb-count {
      background: #2a2a2e;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .lb-count span { color: #e1e1e6; font-weight: 600; }

    /* ── Tickets ── */
    .ticket-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 6px 14px;
      font-size: 0.85rem;
      border: 1px solid #2a2a2e;
      border-radius: 20px;
      background: none;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active { border-color: #5c6bc0; color: #9fa8da; background: #1e1f3a; }

    .tickets { display: flex; flex-direction: column; gap: 8px; }
    .ticket {
      background: #1a1a1e;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .ticket:hover { border-color: #3a3a3e; }
    .ticket-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.open   { background: #34d399; box-shadow: 0 0 6px #34d39966; }
    .status-dot.closed { background: #6b7280; }
    .ticket-desc {
      flex: 1;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
    }
    .ticket-meta { font-size: 0.75rem; color: #666; white-space: nowrap; }
    .ticket-toggle { color: #555; font-size: 0.7rem; transition: transform 0.2s; }
    .ticket.expanded .ticket-toggle { transform: rotate(180deg); }

    .ticket-body {
      display: none;
      border-top: 1px solid #2a2a2e;
      padding: 16px;
    }
    .ticket.expanded .ticket-body { display: block; }

    .ticket-full-desc {
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .reply-area {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .reply-input {
      flex: 1;
      background: #0f0f10;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      color: #e1e1e6;
      padding: 10px 12px;
      font-size: 0.875rem;
      font-family: inherit;
      resize: vertical;
      min-height: 72px;
      transition: border-color 0.2s;
    }
    .reply-input:focus { outline: none; border-color: #5c6bc0; }
    .reply-btn {
      background: #5c6bc0;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.875rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .reply-btn:hover { background: #7986cb; }
    .reply-btn:disabled { background: #2a2a3e; color: #666; cursor: not-allowed; }
    .reply-status { font-size: 0.8rem; margin-top: 8px; }
    .reply-status.ok   { color: #34d399; }
    .reply-status.err  { color: #f87171; }

    /* ── Empty / Loading ── */
    .empty { text-align: center; color: #555; padding: 48px 0; font-size: 0.9rem; }
    .skeleton {
      background: linear-gradient(90deg, #1a1a1e 25%, #222226 50%, #1a1a1e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 10px;
      height: 56px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

<header>
  <span class="logo">🎯 Pixl Dashboard</span>
  <div class="user">
    <img id="user-avatar" src="" alt="" style="display:none">
    <span id="user-name"></span>
  </div>
  <a href="/auth/logout" class="logout">Sign out</a>
</header>

<div class="tabs">
  <button class="tab active" data-tab="leaderboard">🏆 Leaderboard</button>
  <button class="tab" data-tab="tickets">🎫 Tickets</button>
</div>

<div class="content">

  <!-- Leaderboard -->
  <div class="panel active" id="panel-leaderboard">
    <div class="leaderboard" id="leaderboard">
      <div class="skeleton"></div>
      <div class="skeleton" style="opacity:.7"></div>
      <div class="skeleton" style="opacity:.4"></div>
    </div>
  </div>

  <!-- Tickets -->
  <div class="panel" id="panel-tickets">
    <div class="ticket-filters">
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="open">Open</button>
      <button class="filter-btn" data-status="closed">Resolved</button>
    </div>
    <div class="tickets" id="tickets">
      <div class="skeleton"></div>
      <div class="skeleton" style="opacity:.7"></div>
      <div class="skeleton" style="opacity:.4"></div>
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let currentStatus = 'all';
const userCache = {};

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
  });
});

// ── Filter buttons ─────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    loadTickets();
  });
});

// ── API helpers ────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (res.status === 401) { location.href = '/login.html'; return null; }
  return res.json();
}

async function getUser(id) {
  if (userCache[id]) return userCache[id];
  const data = await api(`/api/users/${id}`);
  if (data) userCache[id] = data;
  return data || { id, name: id, avatar: null };
}

// ── User header ────────────────────────────────────────────────────────────────
async function loadMe() {
  const me = await api('/api/me');
  if (!me) return;
  document.getElementById('user-name').textContent = me.name;
  if (me.avatar) {
    const img = document.getElementById('user-avatar');
    img.src = me.avatar;
    img.style.display = 'block';
  }
}

// ── Leaderboard ────────────────────────────────────────────────────────────────
async function loadLeaderboard() {
  const data = await api('/api/leaderboard');
  const el = document.getElementById('leaderboard');
  if (!data || data.error) { el.innerHTML = '<div class="empty">Failed to load leaderboard.</div>'; return; }
  if (data.length === 0) { el.innerHTML = '<div class="empty">No resolved tickets yet.</div>'; return; }

  // Fetch all user profiles in parallel
  const users = await Promise.all(data.map(row => getUser(row.slack_id)));

  const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
  const rankIcon  = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;

  el.innerHTML = data.map((row, i) => {
    const user = users[i] || { name: row.slack_id, avatar: null };
    const avatarHtml = user.avatar
      ? `<img class="lb-avatar" src="${user.avatar}" alt="${user.name}">`
      : `<div class="lb-avatar"></div>`;
    return `
      <div class="lb-row">
        <span class="lb-rank ${rankClass(i)}">${rankIcon(i)}</span>
        ${avatarHtml}
        <span class="lb-name">${escHtml(user.name)}</span>
        <span class="lb-count"><span>${row.resolved}</span> resolved</span>
      </div>`;
  }).join('');
}

// ── Tickets ────────────────────────────────────────────────────────────────────
async function loadTickets() {
  const el = document.getElementById('tickets');
  el.innerHTML = '<div class="skeleton"></div><div class="skeleton" style="opacity:.7"></div>';

  const url = currentStatus === 'all' ? '/api/tickets' : `/api/tickets?status=${currentStatus}`;
  const data = await api(url);
  if (!data || data.error) { el.innerHTML = '<div class="empty">Failed to load tickets.</div>'; return; }
  if (data.length === 0) { el.innerHTML = '<div class="empty">No tickets found.</div>'; return; }

  el.innerHTML = data.map(ticket => `
    <div class="ticket" id="ticket-${ticket.msg_ts}" data-ts="${ticket.msg_ts}">
      <div class="ticket-header" onclick="toggleTicket('${ticket.msg_ts}')">
        <span class="status-dot ${ticket.status}"></span>
        <span class="ticket-desc">${escHtml(ticket.description || '[no description]')}</span>
        <span class="ticket-meta">by <@${ticket.opened_by_slack_id}> · ${relativeTime(ticket.msg_ts)}</span>
        <span class="ticket-toggle">▼</span>
      </div>
      <div class="ticket-body">
        <div class="ticket-full-desc">${escHtml(ticket.description || '[no description]')}</div>
        ${ticket.status === 'open' ? `
        <div class="reply-area">
          <textarea class="reply-input" placeholder="Type your reply… it will be sent to Slack as you." id="reply-text-${ticket.msg_ts}"></textarea>
          <button class="reply-btn" onclick="sendReply('${ticket.msg_ts}')">Send reply</button>
        </div>
        <div class="reply-status" id="reply-status-${ticket.msg_ts}"></div>
        ` : '<div style="color:#555;font-size:.8rem;">This ticket is resolved.</div>'}
      </div>
    </div>
  `).join('');
}

function toggleTicket(ts) {
  document.getElementById(`ticket-${ts}`).classList.toggle('expanded');
}

async function sendReply(ts) {
  const input = document.getElementById(`reply-text-${ts}`);
  const status = document.getElementById(`reply-status-${ts}`);
  const btn = input.nextElementSibling;
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  btn.textContent = 'Sending…';
  status.textContent = '';
  status.className = 'reply-status';

  const res = await api(`/api/tickets/${ts}/reply`, {
    method: 'POST',
    body: JSON.stringify({ text }),
  });

  btn.disabled = false;
  btn.textContent = 'Send reply';

  if (res?.ok) {
    input.value = '';
    status.textContent = '✓ Sent to Slack thread';
    status.className = 'reply-status ok';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } else {
    status.textContent = `✗ ${res?.error || 'Failed to send'}`;
    status.className = 'reply-status err';
  }
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function relativeTime(slackTs) {
  const ms = parseFloat(slackTs) * 1000;
  const diff = Date.now() - ms;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 0) return `${d}d ago`;
  if (h > 0) return `${h}h ago`;
  if (m > 0) return `${m}m ago`;
  return 'just now';
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadMe();
loadLeaderboard();
loadTickets();
</script>
</body>
</html>
